name: OpenWrt Fast Build (ImageBuilder)

on:
  workflow_dispatch:
    inputs:
      version:
        description: OpenWrt version (24.10.0 / 25.12.0-rc2 / snapshots)
        required: true
        default: "24.10.0"
        type: string
      profile:
        description: Target profile
        required: true
        default: "generic"
        type: string
      extra_repos:
        description: Extra repositories to append (workflow helper, one URL per line)
        required: false
        default: ""
        type: string
      upload_release:
        description: Upload to GitHub Release
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  TARGET: x86
  SUBTARGET: 64
  TZ: Asia/Shanghai
  PACKAGES: >-
    luci
    luci-i18n-base-zh-cn
    luci-app-package-manager
    luci-i18n-package-manager-zh-cn
    wget-ssl
    curl
    block-mount
    ttyd
    luci-app-ttyd
    luci-i18n-ttyd-zh-cn
    etherwake
    irqbalance
    luci-app-upnp
    luci-i18n-upnp-zh-cn
    luci-app-wol
    luci-i18n-wol-zh-cn
    luci-app-irqbalance
    luci-i18n-irqbalance-zh-cn
    kmod-igc
    kmod-r8169
    kmod-drm-i915
    kmod-nft-tproxy
    kmod-tun
    kmod-dummy

jobs:
  imagebuilder:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set timezone
        run: sudo timedatectl set-timezone "$TZ"

      - name: Download ImageBuilder
        id: ib
        run: |
          set -eux
          VERSION='${{ inputs.version }}'
          TARGET='${{ env.TARGET }}'
          SUBTARGET='${{ env.SUBTARGET }}'

          if [ "$VERSION" = "snapshots" ]; then
            BASE_URL="https://downloads.openwrt.org/snapshots/targets/$TARGET/$SUBTARGET"
            FILE="openwrt-imagebuilder-$TARGET-$SUBTARGET.Linux-x86_64.tar.zst"
          else
            BASE_URL="https://downloads.openwrt.org/releases/$VERSION/targets/$TARGET/$SUBTARGET"
            FILE="openwrt-imagebuilder-$VERSION-$TARGET-$SUBTARGET.Linux-x86_64.tar.zst"
          fi

          curl -fL "$BASE_URL/$FILE" -o imagebuilder.tar.zst
          mkdir -p GH-ACTION-IMAGEBUILDER
          tar --zstd -xf imagebuilder.tar.zst -C GH-ACTION-IMAGEBUILDER --strip-components=1
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Configure repositories
        run: |
          set -eux
          cd GH-ACTION-IMAGEBUILDER

          # Detect repository file used by this ImageBuilder.
          if [ -f repositories ]; then
            REPO_FILE="repositories"
          elif [ -f repositories.conf ]; then
            REPO_FILE="repositories.conf"
          else
            echo "No repositories file found"
            exit 1
          fi

          # Always keep local packages dir present.
          mkdir -p packages

          # If no local package exists, drop local file:// repo to avoid packages.adb warnings.
          if ! ls packages/*.apk >/dev/null 2>&1; then
            sed -i '/file:\/\/\/packages\(\/\|$\)/d' "$REPO_FILE"
          fi

          # Append optional extra repositories (workflow-level convenience).
          if [ -n "${{ inputs.extra_repos }}" ]; then
            printf '%s\n' "${{ inputs.extra_repos }}" >> "$REPO_FILE"
          fi

          echo "---- $REPO_FILE ----"
          cat "$REPO_FILE"

      - name: Build image
        run: |
          set -eux
          cd GH-ACTION-IMAGEBUILDER

          FILES_ARG=""
          if [ -d "$GITHUB_WORKSPACE/files" ]; then
            FILES_ARG="FILES=$GITHUB_WORKSPACE/files"
          fi

          make image PROFILE='${{ inputs.profile }}' PACKAGES='${{ env.PACKAGES }}' $FILES_ARG

      - name: Organize artifacts
        id: out
        run: |
          set -eux
          cd GH-ACTION-IMAGEBUILDER/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}
          echo "firmware_dir=$PWD" >> "$GITHUB_OUTPUT"
          echo "file_date=$(date +'%Y%m%d%H%M')" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: OpenWrt-${{ inputs.version }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ steps.out.outputs.file_date }}
          path: |
            ${{ steps.out.outputs.firmware_dir }}/*combined*.img.gz
            ${{ steps.out.outputs.firmware_dir }}/*sha256sums*
          if-no-files-found: error
          compression-level: 0

      - name: Upload release
        if: inputs.upload_release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: openwrt-${{ inputs.version }}-${{ steps.out.outputs.file_date }}
          generate_release_notes: true
          files: |
            ${{ steps.out.outputs.firmware_dir }}/*combined*.img.gz
            ${{ steps.out.outputs.firmware_dir }}/*sha256sums*
