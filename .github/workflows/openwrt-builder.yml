name: OpenWrt Fast Build (ImageBuilder)

on:
  workflow_dispatch:
    inputs:
      version:
        description: OpenWrt version (24.10.0 / 25.12.0-rc2 / snapshots)
        required: true
        default: "25.12.2"
        type: string
      profile:
        description: Target profile
        required: true
        default: "generic"
        type: string
      rootfs_partsize:
        description: Root filesystem size in MB
        required: true
        default: "2048"
        type: string
      upload_release:
        description: Upload to GitHub Release
        required: true
        default: true
        type: boolean
  repository_dispatch:

permissions:
  contents: write

env:
  TARGET: x86
  SUBTARGET: 64
  TZ: Asia/Shanghai
  KERNEL_PARTSIZE: "128"
  PACKAGES_FILE: packages.txt
  VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event.client_payload.version || '25.12.2' }}
  PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || github.event.client_payload.profile || 'generic' }}
  ROOTFS_PARTSIZE: ${{ github.event_name == 'workflow_dispatch' && inputs.rootfs_partsize || github.event.client_payload.rootfs_partsize || '2048' }}
  UPLOAD_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_release || github.event.client_payload.upload_release || 'true' }}

jobs:
  imagebuilder:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set timezone
        run: sudo timedatectl set-timezone "$TZ"

      - name: Download ImageBuilder
        id: ib
        run: |
          set -eux
          VERSION='${{ env.VERSION }}'
          TARGET='${{ env.TARGET }}'
          SUBTARGET='${{ env.SUBTARGET }}'

          if [ "$VERSION" = "snapshots" ]; then
            BASE_URL="https://downloads.openwrt.org/snapshots/targets/$TARGET/$SUBTARGET"
            FILE="openwrt-imagebuilder-$TARGET-$SUBTARGET.Linux-x86_64.tar.zst"
          else
            BASE_URL="https://downloads.openwrt.org/releases/$VERSION/targets/$TARGET/$SUBTARGET"
            FILE="openwrt-imagebuilder-$VERSION-$TARGET-$SUBTARGET.Linux-x86_64.tar.zst"
          fi

          curl -fL "$BASE_URL/$FILE" -o imagebuilder.tar.zst
          mkdir -p GH-ACTION-IMAGEBUILDER
          tar --zstd -xf imagebuilder.tar.zst -C GH-ACTION-IMAGEBUILDER --strip-components=1
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Configure repositories
        run: |
          set -eux
          cd GH-ACTION-IMAGEBUILDER

          # Detect repository file used by this ImageBuilder.
          if [ -f repositories ]; then
            REPO_FILE="repositories"
          elif [ -f repositories.conf ]; then
            REPO_FILE="repositories.conf"
          else
            echo "No repositories file found"
            exit 1
          fi

          # Always keep local packages dir present.
          mkdir -p packages

          # If no local package exists, drop local file:// repo to avoid packages.adb warnings.
          if ! ls packages/*.apk >/dev/null 2>&1; then
            sed -i '/file:\/\/\/packages\(\/\|$\)/d' "$REPO_FILE"
          fi

          echo "---- $REPO_FILE ----"
          cat "$REPO_FILE"

      - name: Build image
        run: |
          set -eux
          cd GH-ACTION-IMAGEBUILDER

          # Force kernel/boot partition size in ImageBuilder config.
          if grep -q '^CONFIG_TARGET_KERNEL_PARTSIZE=' .config; then
            sed -i "s/^CONFIG_TARGET_KERNEL_PARTSIZE=.*/CONFIG_TARGET_KERNEL_PARTSIZE=${{ env.KERNEL_PARTSIZE }}/" .config
          else
            echo "CONFIG_TARGET_KERNEL_PARTSIZE=${{ env.KERNEL_PARTSIZE }}" >> .config
          fi
          grep '^CONFIG_TARGET_KERNEL_PARTSIZE=' .config

          if [ ! -f "$GITHUB_WORKSPACE/${{ env.PACKAGES_FILE }}" ]; then
            echo "Package file not found: $GITHUB_WORKSPACE/${{ env.PACKAGES_FILE }}"
            exit 1
          fi

          PACKAGES="$(sed -e 's/#.*$//' -e '/^[[:space:]]*$/d' "$GITHUB_WORKSPACE/${{ env.PACKAGES_FILE }}" | tr '\n' ' ' | xargs)"
          if [ -z "$PACKAGES" ]; then
            echo "Package file is empty: $GITHUB_WORKSPACE/${{ env.PACKAGES_FILE }}"
            exit 1
          fi

          FILES_ARG=""
          if [ -d "$GITHUB_WORKSPACE/files" ]; then
            FILES_ARG="FILES=$GITHUB_WORKSPACE/files"
          fi

          make image PROFILE='${{ env.PROFILE }}' PACKAGES="$PACKAGES" ROOTFS_PARTSIZE='${{ env.ROOTFS_PARTSIZE }}' $FILES_ARG

      - name: Organize artifacts
        id: out
        run: |
          set -eux
          cd GH-ACTION-IMAGEBUILDER/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}
          echo "firmware_dir=$PWD" >> "$GITHUB_OUTPUT"
          echo "file_date=$(date +'%Y%m%d%H%M')" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: OpenWrt-${{ env.VERSION }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ steps.out.outputs.file_date }}
          path: |
            ${{ steps.out.outputs.firmware_dir }}/*combined*.img.gz
            ${{ steps.out.outputs.firmware_dir }}/*sha256sums*
          if-no-files-found: error
          compression-level: 0

      - name: Upload release
        if: env.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: Openwrt-${{ env.VERSION }}-${{ steps.out.outputs.file_date }}
          generate_release_notes: true
          files: |
            ${{ steps.out.outputs.firmware_dir }}/*combined*.img.gz
            ${{ steps.out.outputs.firmware_dir }}/*sha256sums*
